# Required manual secrets for backend service:
# MONGO_URI, JWT_SECRET, RESEND_API_KEY, EMAIL_FROM, EMAIL_FROM_NAME,
# CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET, ARCJET_KEY
#
# Auto-wired by blueprint:
# CLIENT_URL, VITE_API_URL, VITE_SOCKET_URL
#
# Note: Render injects PORT automatically at runtime for web services.
services:
  - type: web
    name: chatify-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: REPLACE_WITH_MONGO_URI
      - key: JWT_SECRET
        value: REPLACE_WITH_JWT_SECRET
      - key: CLIENT_URL
        fromService:
          type: web
          name: chatify-frontend
          property: host
      - key: RESEND_API_KEY
        value: REPLACE_WITH_RESEND_API_KEY
      - key: EMAIL_FROM
        value: REPLACE_WITH_EMAIL_FROM
      - key: EMAIL_FROM_NAME
        value: REPLACE_WITH_EMAIL_FROM_NAME
      - key: CLOUDINARY_CLOUD_NAME
        value: REPLACE_WITH_CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        value: REPLACE_WITH_CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        value: REPLACE_WITH_CLOUDINARY_API_SECRET
      - key: ARCJET_KEY
        value: REPLACE_WITH_ARCJET_KEY
      - key: ARCJET_ENV
        value: production

  - type: web
    name: chatify-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: chatify-backend
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: chatify-backend
          property: host
